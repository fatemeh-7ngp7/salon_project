{% extends 'dashboard/base_dashboard.html' %}
{% block title %}مشتری جدید{% endblock %}

{% block sidebar %}
<div class="sidebar-section">منو</div>
<ul class="sidebar-menu">
    <li><a href="{% url 'dashboard:receptionist:index' %}">🏠 داشبورد</a></li>
    <li><a href="{% url 'dashboard:receptionist:appointment_list' %}">📅 نوبت‌ها</a></li>
    <li><a href="{% url 'dashboard:receptionist:customer_list' %}">👥 مشتریان</a></li>
    <li><a href="{% url 'dashboard:receptionist:customer_create' %}" class="active">➕ مشتری جدید</a></li>
</ul>
{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">ثبت مشتری جدید</h1>
    <a href="{% url 'dashboard:receptionist:customer_list' %}" class="btn btn-secondary">بازگشت</a>
</div>

<div class="card" style="max-width:500px;">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                <div class="form-group">
                    <label class="form-label">نام *</label>
                    <input type="text" name="first_name" class="form-input"
                           value="{{ form_data.first_name|default:'' }}" required>
                </div>
                <div class="form-group">
                    <label class="form-label">نام خانوادگی *</label>
                    <input type="text" name="last_name" class="form-input"
                           value="{{ form_data.last_name|default:'' }}" required>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">شماره موبایل *</label>
                <input type="text" name="phone" class="form-input"
                       value="{{ form_data.phone|default:'' }}"
                       placeholder="09123456789" dir="ltr" required>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                <div class="form-group">
                    <label class="form-label">رمز عبور *</label>
                    <input type="password" name="password1" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">تکرار رمز عبور *</label>
                    <input type="password" name="password2" class="form-input" required>
                </div>
            </div>
            <div style="display:flex;gap:1rem;margin-top:1rem;">
                <button type="submit" class="btn btn-primary">ثبت مشتری</button>
                <a href="{% url 'dashboard:receptionist:customer_list' %}" class="btn btn-secondary">انصراف</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
